<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #e07a5f;
      --accent-hover: #e89078;
      --accent-press: #c96a52;
      --accent-soft: rgba(224, 122, 95, 0.2);
      --accent-glow: rgba(224, 122, 95, 0.4);
    }

    [data-theme="dark"] {
      --bg-app: #0c0e12;
      --bg-elevated: rgba(255, 255, 255, 0.06);
      --bg-item: rgba(255, 255, 255, 0.05);
      --text: #f2ece6;
      --text-soft: rgba(242, 236, 230, 0.72);
      --border: rgba(255, 255, 255, 0.1);
      --border-item: rgba(255, 255, 255, 0.08);
      --bar-bg: rgba(12, 14, 18, 0.72);
      --blob-1: #3d2a4a;
      --blob-2: #1e3d3a;
      --blob-3: #4a3028;
      --shadow-bar: 0 1px 0 rgba(255, 255, 255, 0.06);
      --shadow-card: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    [data-theme="light"] {
      --bg-app: #eef0f4;
      --bg-elevated: #ffffff;
      --bg-item: rgba(15, 20, 30, 0.04);
      --text: #1a1f2e;
      --text-soft: rgba(26, 31, 46, 0.65);
      --border: rgba(15, 20, 30, 0.08);
      --border-item: rgba(15, 20, 30, 0.07);
      --bar-bg: rgba(255, 255, 255, 0.82);
      --blob-1: #c4b5d8;
      --blob-2: #a8d4cf;
      --blob-3: #e8c4b8;
      --shadow-bar: 0 1px 0 rgba(15, 20, 30, 0.06);
      --shadow-card: 0 16px 40px rgba(15, 20, 30, 0.08);
      --accent-glow: rgba(224, 122, 95, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      font-family: "DM Sans", system-ui, sans-serif;
      font-optical-sizing: auto;
      color: var(--text);
      line-height: 1.55;
      background: var(--bg-app);
      overflow-x: hidden;
      transition: background 0.35s ease, color 0.25s ease;
    }

    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    [data-theme="light"] .bg-stage {
      opacity: 0.65;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: floatBlob 18s ease-in-out infinite;
    }

    .blob:nth-child(1) {
      width: min(55vw, 420px);
      height: min(55vw, 420px);
      background: var(--blob-1);
      top: -12%;
      left: -8%;
    }

    .blob:nth-child(2) {
      width: min(50vw, 380px);
      height: min(50vw, 380px);
      background: var(--blob-2);
      bottom: -15%;
      right: -10%;
      animation-delay: -6s;
    }

    .blob:nth-child(3) {
      width: min(40vw, 300px);
      height: min(40vw, 300px);
      background: var(--blob-3);
      top: 42%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: -12s;
      animation-name: floatBlobCenter;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(6%, 4%) scale(1.08); }
      66% { transform: translate(-5%, 6%) scale(0.95); }
    }

    @keyframes floatBlobCenter {
      0%, 100% { transform: translate(-50%, 0) scale(1); }
      50% { transform: translate(-48%, -8%) scale(1.12); }
    }

    /* Оболочка приложения */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 32rem;
      margin: 0 auto;
    }

    .app-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: calc(0.65rem + env(safe-area-inset-top, 0)) 1rem 0.65rem;
      background: var(--bar-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-bar);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .theme-toggle {
      position: relative;
      width: 3.25rem;
      height: 1.75rem;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: var(--bg-item);
      box-shadow: 0 0 0 1px var(--border) inset;
      cursor: pointer;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    .theme-toggle:hover {
      box-shadow: 0 0 0 1px var(--border), 0 0 0 3px var(--accent-soft);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .theme-toggle__thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: calc(1.75rem - 6px);
      height: calc(1.75rem - 6px);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 2px 8px var(--accent-glow);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    [data-theme="light"] .theme-toggle__thumb {
      transform: translateX(1.5rem);
    }

    .theme-toggle__icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.4rem;
      pointer-events: none;
    }

    .theme-toggle__icon svg {
      width: 0.75rem;
      height: 0.75rem;
      opacity: 0.4;
      transition: opacity 0.2s ease;
      fill: currentColor;
      color: var(--text-soft);
    }

    [data-theme="dark"] .theme-toggle__icon .moon { opacity: 0.95; }
    [data-theme="light"] .theme-toggle__icon .sun { opacity: 0.95; }

    .app-main {
      flex: 1;
      padding: 1.25rem 1rem 1rem;
      padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sheet {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 1.125rem;
      padding: 1.35rem 1.15rem 1.25rem;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      animation: sheetIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    @keyframes sheetIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: clamp(1.35rem, 4.5vw, 1.65rem);
      line-height: 1.25;
      margin: 0 0 0.3rem;
      letter-spacing: -0.02em;
      animation: titleIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      opacity: 0;
    }

    @keyframes titleIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .accent-line {
      height: 3px;
      width: 0;
      max-width: 4rem;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin-bottom: 1.25rem;
      animation: lineGrow 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    @keyframes lineGrow {
      to { width: 100%; }
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    li {
      position: relative;
      padding: 0.9rem 0.95rem 0.9rem 1rem;
      border-radius: 0.875rem;
      background: var(--bg-item);
      border: 1px solid var(--border-item);
      color: var(--text-soft);
      font-size: 0.95rem;
      font-weight: 500;
      transition:
        transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.3s ease,
        box-shadow 0.3s ease,
        color 0.3s ease;
      animation: itemIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    li:nth-child(1) { animation-delay: 0.45s; }
    li:nth-child(2) { animation-delay: 0.58s; }
    li:nth-child(3) { animation-delay: 0.71s; }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      border-radius: 0 2px 2px 0;
      background: var(--accent);
      transition: height 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    li:hover {
      transform: translateX(4px);
      border-color: rgba(224, 122, 95, 0.35);
      color: var(--text);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12), 0 0 20px var(--accent-glow);
    }

    [data-theme="dark"] li:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25), 0 0 24px var(--accent-glow);
    }

    li:hover::before {
      height: 55%;
    }

    /* Нижняя панель + кнопка */
    .app-dock {
      position: sticky;
      bottom: 0;
      z-index: 20;
      padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom, 0));
      background: linear-gradient(to top, var(--bg-app) 70%, transparent);
      margin-top: auto;
      transition: background 0.3s ease;
    }

    .btn-generate {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.95rem 1.25rem;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent) 0%, #c45c42 100%);
      box-shadow:
        0 4px 16px var(--accent-glow),
        0 0 0 1px rgba(255, 255, 255, 0.12) inset;
      overflow: hidden;
      transition:
        transform 0.2s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.25s ease,
        filter 0.2s ease;
    }

    .btn-generate::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 0%,
        transparent 40%,
        rgba(255, 255, 255, 0.22) 50%,
        transparent 60%,
        transparent 100%
      );
      background-size: 220% 100%;
      animation: btnShimmer 3.5s ease-in-out infinite;
    }

    @keyframes btnShimmer {
      0%, 100% { background-position: 120% 0; }
      50% { background-position: -120% 0; }
    }

    .btn-generate:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
      box-shadow:
        0 8px 28px var(--accent-glow),
        0 0 0 1px rgba(255, 255, 255, 0.15) inset;
    }

    .btn-generate:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-generate:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .btn-generate__text,
    .btn-generate__spark {
      position: relative;
      z-index: 1;
    }

    .btn-generate__spark {
      font-size: 1.1rem;
      line-height: 1;
      display: inline-block;
      animation: sparkBob 2.2s ease-in-out infinite;
    }

    @keyframes sparkBob {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.08); }
    }

    .btn-generate.is-working {
      pointer-events: none;
      animation: btnPulse 0.9s ease-in-out;
    }

    @keyframes btnPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 16px var(--accent-glow); }
      40% { transform: scale(1.02); box-shadow: 0 0 32px var(--accent-glow), 0 8px 32px rgba(224, 122, 95, 0.35); }
      70% { transform: scale(0.99); }
    }

    .btn-generate.is-working .btn-generate__spark {
      animation: sparkSpin 0.65s ease-in-out;
    }

    @keyframes sparkSpin {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1.15); }
    }

    @media (prefers-reduced-motion: reduce) {
      .blob,
      .sheet,
      h1,
      .accent-line,
      li {
        animation: none;
        opacity: 1;
        transform: none;
      }

      .accent-line {
        width: 4rem;
      }

      li:hover {
        transform: none;
      }

      .btn-generate::before {
        animation: none;
      }

      .btn-generate__spark {
        animation: none;
      }

      .btn-generate.is-working {
        animation: none;
      }

      .btn-generate.is-working .btn-generate__spark {
        animation: none;
      }

      .theme-toggle__thumb {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stage" aria-hidden="true">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <div class="app">
    <header class="app-bar">
      <button
        type="button"
        class="theme-toggle"
        id="themeToggle"
        aria-label="Переключить тему"
        aria-pressed="false"
        title="Светлая / тёмная тема"
      >
        <span class="theme-toggle__thumb" aria-hidden="true"></span>
        <span class="theme-toggle__icon" aria-hidden="true">
          <svg class="moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.5A8.5 8.5 0 0111.5 4a8.46 8.46 0 013.5.75 7.5 7.5 0 100 14.5A8.46 8.46 0 0111.5 20 8.5 8.5 0 009.5-5.5z"/></svg>
          <svg class="sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7a5 5 0 100 10 5 5 0 000-10zm0-5h1v3h-2V2zm0 17h1v3h-2v-3zM4.22 4.22l.7.7 2.12 2.12-1.41 1.41-2.12-2.12-.7-.7 1.41-1.41zm14.14 0l1.41 1.41-2.12 2.12-1.41-1.41 2.12-2.12.7-.7zM2 12v1h3v-2H2zm17 0v1h3v-2h-3zM6.34 17.66l2.12 2.12-1.41 1.41-2.12-2.12.7-.7 1.41-1.41zm11.32 0l.7.7-2.12 2.12-1.41-1.41 2.12-2.12z"/></svg>
        </span>
      </button>
    </header>

    <main class="app-main">
      <section class="sheet" aria-labelledby="page-title">
        <h1 id="page-title">Генератор идей для постов</h1>
        <div class="accent-line" aria-hidden="true"></div>
        <ul>
          <li>5 идей для постов экспертов</li>
          <li>3 идеи сториз на сегодня</li>
          <li>контент-план на неделю</li>
        </ul>
      </section>
    </main>

    <div class="app-dock">
      <button type="button" class="btn-generate" id="btnGenerate">
        <span class="btn-generate__spark" aria-hidden="true">✦</span>
        <span class="btn-generate__text">Сгенерировать идеи</span>
      </button>
    </div>
  </div>

  <script>
    (function () {
      var root = document.documentElement;
      var storageKey = "post-ideas-theme";

      function getStoredTheme() {
        try {
          return localStorage.getItem(storageKey);
        } catch (e) {
          return null;
        }
      }

      function setTheme(theme) {
        root.dataset.theme = theme;
        try {
          localStorage.setItem(storageKey, theme);
        } catch (e) { /* ignore */ }
        var toggle = document.getElementById("themeToggle");
        if (toggle) {
          toggle.setAttribute("aria-pressed", theme === "light" ? "true" : "false");
          toggle.setAttribute(
            "aria-label",
            theme === "light" ? "Включить тёмную тему" : "Включить светлую тему"
          );
        }
      }

      var prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
      var initial = getStoredTheme();
      if (initial !== "light" && initial !== "dark") {
        initial = prefersDark.matches ? "dark" : "light";
      }
      setTheme(initial);

      document.getElementById("themeToggle").addEventListener("click", function () {
        setTheme(root.dataset.theme === "light" ? "dark" : "light");
      });

      var btn = document.getElementById("btnGenerate");
      btn.addEventListener("click", function () {
        if (btn.classList.contains("is-working")) return;
        btn.classList.add("is-working");
        window.setTimeout(function () {
          btn.classList.remove("is-working");
        }, 900);
      });
    })();
  </script>
</body>
</html>
